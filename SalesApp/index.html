<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SalesFlow">
  <meta name="theme-color" content="#007AFF">
  <title>SalesFlow</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Toast notification banner -->
<div id="toast" aria-live="polite"></div>

<div id="app">

  <!-- ── Header ── -->
  <header id="header">
    <button id="btn-back" class="header-btn hidden" aria-label="Back">
      <svg width="11" height="19" viewBox="0 0 11 19" fill="none">
        <path d="M9.5 1.5L1.5 9.5L9.5 17.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="btn-back-label">Back</span>
    </button>
    <h1 id="header-title">Contacts</h1>
    <button id="btn-header-right" class="header-btn header-btn-right" aria-label="Add">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 2V18M2 10H18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <!-- ── Main scrollable content ── -->
  <main id="content"></main>

  <!-- ── Bottom tab bar ── -->
  <nav id="tab-bar">
    <button class="tab active" data-tab="contacts" onclick="tabClick('contacts')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
        <path d="M1 21v-1a8 8 0 0116 0v1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M18 8v6M21 11h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Contacts</span>
    </button>
    <button class="tab" data-tab="followups" onclick="tabClick('followups')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="4" width="18" height="17" rx="3" stroke="currentColor" stroke-width="2"/>
        <path d="M3 9h18" stroke="currentColor" stroke-width="2"/>
        <path d="M8 2v4M16 2v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="15" r="2" fill="currentColor"/>
      </svg>
      <span>Follow-ups</span>
      <span id="badge-followups" class="badge hidden"></span>
    </button>
  </nav>

</div>

<!-- ── Modal sheet ── -->
<div id="modal-backdrop" class="hidden" onclick="hideModal()"></div>
<div id="modal-sheet" class="hidden" role="dialog" aria-modal="true">
  <div class="modal-handle"></div>
  <div id="modal-content"></div>
</div>

<!-- ── Confirm dialog ── -->
<div id="confirm-backdrop" class="hidden"></div>
<div id="confirm-dialog" class="hidden" role="alertdialog">
  <p id="confirm-msg"></p>
  <div class="confirm-actions">
    <button id="confirm-cancel" onclick="hideConfirm()">Cancel</button>
    <button id="confirm-ok" class="destructive">Delete</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
